<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Нова ціль — Daily Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e12; --surface: #17171f; --border: #2a2a38;
      --accent: #7c6af7; --accent-h: #9d8fff; --text: #e8e8f0;
      --muted: #6b6b80; --danger: #f05f6e; --radius: 14px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 40px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.2; pointer-events: none;
    }

    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,18,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; gap: 16px;
    }
    .back-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: 'Inter', sans-serif; font-size: 13px;
      padding: 6px 12px; cursor: pointer; transition: border-color 0.2s, color 0.2s;
      text-decoration: none; display: flex; align-items: center; gap: 6px;
    }
    .back-btn:hover { border-color: var(--accent); color: var(--accent); }
    .logo { font-family: 'Space Grotesk', sans-serif; font-size: 20px; color: var(--accent); }
    .logo span { color: var(--text); }

    main {
      max-width: 520px; margin: 0 auto;
      padding: 40px 24px; position: relative; z-index: 1;
    }

    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 26px; font-weight: 700; margin-bottom: 6px;
    }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 36px; }

    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
    }

    .field { margin-bottom: 20px; }
    label {
      display: block; font-size: 13px; font-weight: 500;
      color: var(--muted); margin-bottom: 7px;
      letter-spacing: 0.3px; text-transform: uppercase;
    }
    .hint { font-size: 12px; color: var(--muted); margin-top: 5px; text-transform: none; font-weight: 400; letter-spacing: 0; }

    input, textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 15px;
      outline: none; transition: border-color 0.2s;
    }
    input:focus, textarea:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    textarea { resize: vertical; min-height: 90px; }

    /* datetime — прибираємо дефолтний стиль */
    input[type="datetime-local"]::-webkit-calendar-picker-indicator {
      filter: invert(0.5);
      cursor: pointer;
    }

    .char-count { text-align: right; font-size: 12px; color: var(--muted); margin-top: 4px; }

    .actions { display: flex; gap: 12px; margin-top: 8px; }
    .btn {
      flex: 1; padding: 13px; border-radius: 8px;
      font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: background 0.2s, transform 0.1s; border: none;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      background: none; border: 1px solid var(--border); color: var(--muted);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    .error {
      margin-top: 16px; padding: 10px 14px;
      background: rgba(240,95,110,0.12); border: 1px solid rgba(240,95,110,0.3);
      border-radius: 8px; color: var(--danger); font-size: 13px; display: none;
    }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <header>
    <a class="back-btn" href="index.html">← Назад</a>
    <div class="logo">Daily<span>Game</span></div>
  </header>

  <main>
    <h1 class="page-title">Нова ціль</h1>
    <p class="page-sub">Опиши що хочеш досягти</p>

    <div class="card">
      <div class="field">
        <label for="title">Назва *</label>
        <input
          id="title" type="text"
          placeholder="Наприклад: Читати 20 хвилин"
          maxlength="100"
          oninput="updateCount()"
        />
        <div class="char-count"><span id="charCount">0</span>/100</div>
      </div>

      <div class="field">
        <label for="description">Опис <span style="font-weight:400;text-transform:none">(необов'язково)</span></label>
        <textarea
          id="description"
          placeholder="Навіщо ця ціль? Як ти будеш її виконувати?"
          maxlength="500"
        ></textarea>
      </div>

      <div class="field">
        <label for="scheduled_at">Запланувати на <span style="font-weight:400;text-transform:none">(необов'язково)</span></label>
        <input id="scheduled_at" type="datetime-local"/>
        <span class="hint">Якщо не вказано — ціль без конкретного часу</span>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" onclick="window.location.href='index.html'">Скасувати</button>
        <button class="btn btn-primary" id="createBtn" onclick="createGoal()">Створити ціль</button>
      </div>

      <div class="error" id="errorMsg"></div>
    </div>
  </main>

  <script>
    const API   = 'http://127.0.0.1:8000';
    const token = localStorage.getItem('token');

    if (!token) window.location.href = 'login.html';

    function updateCount() {
      const val = document.getElementById('title').value.length;
      document.getElementById('charCount').textContent = val;
    }

    async function createGoal() {
      const title        = document.getElementById('title').value.trim();
      const description  = document.getElementById('description').value.trim() || null;
      const scheduled_at = document.getElementById('scheduled_at').value || null;
      const btn          = document.getElementById('createBtn');
      const errEl        = document.getElementById('errorMsg');

      errEl.style.display = 'none';

      if (!title) { showError('Введи назву цілі'); return; }
      if (title.length > 100) { showError('Назва занадто довга'); return; }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Створюю...';

      try {
        const body = { title, description };
        // scheduled_at треба в ISO форматі
        if (scheduled_at) body.scheduled_at = new Date(scheduled_at).toISOString();

        const res = await fetch(`${API}/goals`, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
          body: JSON.stringify(body),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Помилка створення цілі');
          return;
        }

        window.location.href = 'index.html';

      } catch {
        showError('Сервер недоступний. Перевір підключення.');
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Створити ціль';
      }
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }
  </script>
</body>
</html>
