<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Мої цілі — Daily Game</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e12; --surface: #17171f; --surface2: #1e1e28;
      --border: #2a2a38; --accent: #7c6af7; --accent-h: #9d8fff;
      --text: #e8e8f0; --muted: #6b6b80; --danger: #f05f6e;
      --success: #4ade80; --warning: #fbbf24; --radius: 14px;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; min-height: 100vh; padding-bottom: 80px;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px; opacity: 0.2; pointer-events: none; z-index: 0;
    }

    /* HEADER */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,18,0.85); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { font-family: 'Space Grotesk', sans-serif; font-size: 20px; color: var(--accent); }
    .logo span { color: var(--text); }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .username { font-size: 14px; color: var(--muted); }
    .logout-btn {
      background: none; border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-family: 'Inter', sans-serif; font-size: 13px;
      padding: 6px 12px; cursor: pointer; transition: border-color 0.2s, color 0.2s;
    }
    .logout-btn:hover { border-color: var(--danger); color: var(--danger); }
    .admin-btn {
      background: rgba(240,95,110,0.1); border: 1px solid rgba(240,95,110,0.3);
      border-radius: 8px; color: var(--danger); font-family: 'Inter', sans-serif;
      font-size: 13px; font-weight: 500; padding: 6px 12px; cursor: pointer;
      transition: background 0.2s; text-decoration: none; display: none;
    }
    .admin-btn:hover { background: rgba(240,95,110,0.2); }

    /* MAIN */
    main { max-width: 900px; margin: 0 auto; padding: 32px 24px; position: relative; z-index: 1; }

    .page-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px; font-weight: 700;
      margin-bottom: 8px;
    }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    /* GRID */
    .goals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .goal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
    }
    .goal-card:hover { border-color: var(--accent); transform: translateY(-2px); }
    .goal-card.completed { border-color: rgba(74,222,128,0.3); }

    /* hover menu */
    .card-menu {
      position: absolute; top: 12px; right: 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
      opacity: 0; pointer-events: none;
      transition: opacity 0.15s;
      z-index: 10;
    }
    .goal-card:hover .card-menu { opacity: 1; pointer-events: all; }
    .menu-item {
      display: block; width: 100%; padding: 8px 14px;
      background: none; border: none; text-align: left;
      font-family: 'Inter', sans-serif; font-size: 13px;
      color: var(--text); cursor: pointer; white-space: nowrap;
      transition: background 0.15s;
    }
    .menu-item:hover { background: var(--border); }
    .menu-item.danger { color: var(--danger); }
    .menu-item.danger:hover { background: rgba(240,95,110,0.12); }
    .menu-item.disabled { color: var(--muted); cursor: not-allowed; }

    .card-title {
      font-weight: 600; font-size: 16px;
      margin-bottom: 6px; padding-right: 60px;
      line-height: 1.3;
    }
    .card-desc {
      font-size: 13px; color: var(--muted);
      margin-bottom: 16px; line-height: 1.5;
    }
    .card-desc:empty { display: none; }

    /* streak */
    .streak-row {
      display: flex; align-items: center;
      justify-content: space-between; margin-bottom: 8px;
    }
    .streak-label { font-size: 12px; color: var(--muted); }
    .streak-count { font-size: 13px; font-weight: 600; color: var(--warning); }
    .streak-count.high { color: var(--success); }

    .progress-bar {
      height: 4px; background: var(--border); border-radius: 2px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; background: var(--accent); border-radius: 2px;
      transition: width 0.4s ease;
    }
    .progress-fill.high { background: var(--success); }

    /* scheduled */
    .card-date {
      margin-top: 12px; font-size: 12px; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }

    /* complete button */
    .complete-btn {
      margin-top: 14px; width: 100%; padding: 9px;
      background: rgba(124,106,247,0.12); border: 1px solid rgba(124,106,247,0.3);
      border-radius: 8px; color: var(--accent);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background 0.2s, border-color 0.2s;
    }
    .complete-btn:hover { background: rgba(124,106,247,0.22); border-color: var(--accent); }
    .complete-btn.done {
      background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3);
      color: var(--success); cursor: default;
    }

    /* empty state */
    .empty {
      grid-column: 1 / -1;
      text-align: center; padding: 60px 20px;
      color: var(--muted);
    }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }
    .empty p { font-size: 14px; }

    /* loading */
    .loading {
      grid-column: 1 / -1; text-align: center;
      padding: 60px; color: var(--muted);
    }
    .spinner {
      display: inline-block; width: 28px; height: 28px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* toast */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px;
      font-size: 14px; color: var(--text);
      opacity: 0; transition: opacity 0.25s, transform 0.25s;
      pointer-events: none; z-index: 200; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(74,222,128,0.4); color: var(--success); }
    .toast.error   { border-color: rgba(240,95,110,0.4); color: var(--danger); }

    /* FAB */
    .fab {
      position: fixed; bottom: 28px; right: 28px;
      width: 56px; height: 56px; border-radius: 50%;
      background: var(--accent); border: none;
      color: #fff; font-size: 28px; line-height: 1;
      cursor: pointer; box-shadow: 0 4px 20px rgba(124,106,247,0.4);
      transition: background 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .fab:hover { background: var(--accent-h); transform: scale(1.08); }
    .fab:active { transform: scale(0.95); }
  </style>
</head>
<body>
  <header>
    <div class="logo">Daily<span>Game</span></div>
    <div class="header-right">
      <span class="username" id="usernameEl"></span>
      <a class="admin-btn" id="adminBtn" href="admin.html">⚙️ Адмін</a>
      <button class="logout-btn" onclick="logout()">Вийти</button>
    </div>
  </header>

  <main>
    <h1 class="page-title">Мої цілі</h1>
    <p class="page-sub" id="pageSubEl">Завантаження...</p>

    <div class="goals-grid" id="goalsGrid">
      <div class="loading">
        <div class="spinner"></div>
        <div>Завантаження цілей...</div>
      </div>
    </div>
  </main>

  <button class="fab" onclick="window.location.href='create-goal.html'" title="Додати ціль">+</button>
  <div class="toast" id="toast"></div>

  <script>
    const API   = 'http://127.0.0.1:8000';
    const token = localStorage.getItem('token');

    if (!token) window.location.href = 'login.html';

    // decode JWT payload (без верифікації — лише для UI)
    function parseJwt(t) {
      try { return JSON.parse(atob(t.split('.')[1])); } catch { return {}; }
    }

    const payload = parseJwt(token);
    document.getElementById('usernameEl').textContent = payload.sub || '';
    if (payload.is_admin) {
      document.getElementById('adminBtn').style.display = 'inline-flex';
    }

    function authHeaders() {
      return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
    }

    function logout() {
      localStorage.removeItem('token');
      window.location.href = 'login.html';
    }

    function showToast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = `toast ${type} show`;
      setTimeout(() => { el.className = `toast ${type}`; }, 3000);
    }

    // streak прогрес — кожні 7 днів = 100%
    function streakProgress(count) {
      if (count === 0) return 0;
      const cycle = count % 7 || 7;
      return Math.round((cycle / 7) * 100);
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleDateString('uk-UA', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    }

    function renderCard(goal) {
      const progress = streakProgress(goal.streak_count);
      const isHigh   = goal.streak_count >= 7;
      const isDone   = goal.is_completed;

      return `
        <div class="goal-card ${isDone ? 'completed' : ''}" id="card-${goal.id}">
          <div class="card-menu">
            <button class="menu-item disabled">✏️ Змінити (скоро)</button>
            <button class="menu-item danger" onclick="deleteGoal(${goal.id}, event)">🗑 Видалити</button>
          </div>

          <div class="card-title">${escHtml(goal.title)}</div>
          <div class="card-desc">${escHtml(goal.description || '')}</div>

          <div class="streak-row">
            <span class="streak-label">🔥 Стрік</span>
            <span class="streak-count ${isHigh ? 'high' : ''}">${goal.streak_count} дн.</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${isHigh ? 'high' : ''}" style="width:${progress}%"></div>
          </div>

          ${goal.scheduled_at ? `<div class="card-date">📅 ${formatDate(goal.scheduled_at)}</div>` : ''}

          <button
            class="complete-btn ${isDone ? 'done' : ''}"
            onclick="completeGoal(${goal.id}, this)"
            ${isDone ? 'disabled' : ''}>
            ${isDone ? '✓ Виконано сьогодні' : 'Відмітити виконаною'}
          </button>
        </div>`;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    async function loadGoals() {
      try {
        const res = await fetch(`${API}/goals`, { headers: authHeaders() });

        if (res.status === 401) { logout(); return; }

        const goals = await res.json();
        const grid  = document.getElementById('goalsGrid');
        const sub   = document.getElementById('pageSubEl');

        if (!goals.length) {
          sub.textContent = 'У тебе ще немає цілей';
          grid.innerHTML = `
            <div class="empty">
              <div class="empty-icon">🎯</div>
              <h3>Цілей поки немає</h3>
              <p>Натисни + щоб додати першу</p>
            </div>`;
          return;
        }

        sub.textContent = `${goals.length} ${goals.length === 1 ? 'ціль' : goals.length < 5 ? 'цілі' : 'цілей'}`;
        grid.innerHTML = goals.map(renderCard).join('');

      } catch {
        document.getElementById('goalsGrid').innerHTML =
          '<div class="loading" style="color:var(--danger)">Не вдалось завантажити цілі</div>';
      }
    }

    async function completeGoal(id, btn) {
      btn.disabled = true;
      try {
        const res = await fetch(`${API}/goals/${id}/complete`, {
          method: 'PATCH', headers: authHeaders(),
        });

        if (!res.ok) { btn.disabled = false; return; }

        const data = await res.json();
        const goal = data.goal;

        // оновлюємо карточку
        const card = document.getElementById(`card-${id}`);
        card.outerHTML = renderCard(goal);

        showToast(data.message || 'Виконано!', 'success');
      } catch {
        btn.disabled = false;
        showToast('Помилка', 'error');
      }
    }

    async function deleteGoal(id, e) {
      e.stopPropagation();
      if (!confirm('Видалити цю ціль?')) return;
      try {
        const res = await fetch(`${API}/goals/${id}`, {
          method: 'DELETE', headers: authHeaders(),
        });
        if (res.status === 204 || res.ok) {
          document.getElementById(`card-${id}`)?.remove();
          showToast('Ціль видалено', '');
          // якщо більше немає карток — перемалювати empty state
          const grid = document.getElementById('goalsGrid');
          if (!grid.querySelector('.goal-card')) loadGoals();
        }
      } catch {
        showToast('Помилка видалення', 'error');
      }
    }

    loadGoals();
  </script>
</body>
</html>
